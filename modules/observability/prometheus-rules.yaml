groups:
  - name: app_derived_metrics
    interval: 30s
    rules:
      - record: app_http_server_5xx_errors_5m
        expr: |
          round(
            (
              sum by (job, http_route, source, deployment_environment, service_namespace, service_name) (
                increase(
                  http_server_request_duration_seconds_count{
                    source="app",
                    http_response_status_code=~"5..",
                    http_route!="/error"
                  }[5m]
                )
              )
            )
            or on (job, http_route, source, deployment_environment, service_namespace, service_name)
            (
              0
              *
              sum by (job, http_route, source, deployment_environment, service_namespace, service_name) (
                increase(
                  http_server_request_duration_seconds_count{
                    source="app",
                    http_route!="/error"
                  }[5m]
                )
              )
            )
          )

      - record: app_http_server_4xx_errors_5m
        expr: |
          round(
            (
              sum by (job, http_route, source, deployment_environment, service_namespace, service_name) (
                increase(
                  http_server_request_duration_seconds_count{
                    source="app",
                    http_response_status_code=~"4..",
                    http_route!="/error"
                  }[5m]
                )
              )
            )
            or on (job, http_route, source, deployment_environment, service_namespace, service_name)
            (
              0
              *
              sum by (job, http_route, source, deployment_environment, service_namespace, service_name) (
                increase(
                  http_server_request_duration_seconds_count{
                    source="app",
                    http_route!="/error"
                  }[5m]
                )
              )
            )
          )

      - record: app_http_server_requests_5m
        expr: |
          round(
            sum by (job, http_route, source, deployment_environment, service_namespace, service_name) (
              increase(
                http_server_request_duration_seconds_count{
                  source="app",
                  http_route!="/error"
                }[5m]
              )
            )
          )

      - record: app_http_server_5xx_error_ratio_5m
        expr: |
          app_http_server_5xx_errors_5m
          /
          clamp_min(app_http_server_requests_5m, 1)

      - record: app_http_server_4xx_error_ratio_5m
        expr: |
          app_http_server_4xx_errors_5m
          /
          clamp_min(app_http_server_requests_5m, 1)

      - record: app_http_server_latency_p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, http_route, le, source, deployment_environment, service_namespace, service_name) (
              rate(
                http_server_request_duration_seconds_bucket{
                  source="app",
                  http_route!="/error"
                }[5m]
              )
            )
          )

  - name: infra_derived_metrics
    interval: 30s
    rules:
      - record: app_container_cpu_utilization_avg_5m
        expr: |
          avg by (container_name, source, deployment_environment, service_namespace, service_name) (
            avg_over_time(
              container_cpu_utilization_ratio{
                source="container",
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: app_container_memory_utilization_avg_5m
        expr: |
          avg by (container_name, source, deployment_environment, service_namespace, service_name) (
            avg_over_time(
              container_memory_percent_ratio{
                source="container",
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: app_container_cpu_utilization_max_5m
        expr: |
          max by (container_name, source, deployment_environment, service_namespace, service_name) (
            max_over_time(
              container_cpu_utilization_ratio{
                source="container",
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: app_container_memory_utilization_max_5m
        expr: |
          max by (container_name, source, deployment_environment, service_namespace, service_name) (
            max_over_time(
              container_memory_percent_ratio{
                source="container",
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: host_memory_usage_avg_5m
        expr: |
          avg by (job, host_name, source, deployment_environment, service_namespace, service_name) (
            avg_over_time(system_memory_usage_bytes{source="host"}[5m])
          )

      - record: host_network_rx_bytes_5m
        expr: |
          round(
            sum by (job, host_name, source, deployment_environment, service_namespace, service_name) (
              increase(system_network_io_bytes_total{source="host", direction="receive"}[5m])
            )
          )

      - record: host_network_tx_bytes_5m
        expr: |
          round(
            sum by (job, host_name, source, deployment_environment, service_namespace, service_name) (
              increase(system_network_io_bytes_total{source="host", direction="transmit"}[5m])
            )
          )

  - name: jvm_derived_metrics
    interval: 30s
    rules:
      - record: app_jvm_cpu_utilization_avg_5m
        expr: |
          avg by (job, source, deployment_environment, service_namespace, service_name) (
            avg_over_time(jvm_cpu_recent_utilization_ratio{source="app"}[5m])
          )

      - record: app_jvm_cpu_utilization_pct_avg_5m
        expr: |
          100 * app_jvm_cpu_utilization_avg_5m

      - record: app_jvm_memory_used_avg_5m
        expr: |
          avg by (job, source, deployment_environment, service_namespace, service_name) (
            avg_over_time(jvm_memory_used_bytes{source="app"}[5m])
          )

      - record: app_jvm_memory_used_max_5m
        expr: |
          max by (job, source, deployment_environment, service_namespace, service_name) (
            max_over_time(jvm_memory_used_bytes{source="app"}[5m])
          )

      - record: app_jvm_gc_count_5m
        expr: |
          round(
            sum by (job, source, deployment_environment, service_namespace, service_name) (
              increase(jvm_gc_duration_seconds_count{source="app"}[5m])
            )
          )

      - record: app_jvm_gc_duration_p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le, source, deployment_environment, service_namespace, service_name) (
              rate(jvm_gc_duration_seconds_bucket{source="app"}[5m])
            )
          )

  - name: db_derived_metrics
    interval: 30s
    rules:
      - record: app_db_connection_wait_p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le, deployment_environment, service_namespace, service_name) (
              rate(db_client_connections_wait_time_milliseconds_bucket[5m])
            )
          )

      - record: app_db_connection_use_p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le, deployment_environment, service_namespace, service_name) (
              rate(db_client_connections_use_time_milliseconds_bucket[5m])
            )
          )

  - name: alert_derived_metrics
    interval: 1m
    rules:
      - record: job:http_known_services:presence
        expr: |
          (
            group by (job, deployment_environment)(
              last_over_time(http_server_request_duration_seconds_count[24h])
            )
          ) or (
            group by (job, deployment_environment)(
              last_over_time(http_server_duration_milliseconds_count[24h])
            )
          )

      - record: job:http_4xx_error_ratio:rate5m
        expr: |
          (
            sum by (job, deployment_environment, source)(
              rate(http_server_request_duration_seconds_count{http_response_status_code=~"4.."}[5m])
            )
            or
            sum by (job, deployment_environment, source)(
              rate(http_server_request_duration_seconds_count[5m]) * 0
            )
          )
          /
          sum by (job, deployment_environment, source)(
            rate(http_server_request_duration_seconds_count[5m])
          )

      - record: job:http_5xx_error_ratio:rate5m
        expr: |
          (
            sum by (job, deployment_environment, source)(
              rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])
            )
            or
            sum by (job, deployment_environment, source)(
              rate(http_server_request_duration_seconds_count[5m]) * 0
            )
          )
          /
          sum by (job, deployment_environment, source)(
            rate(http_server_request_duration_seconds_count[5m])
          )
