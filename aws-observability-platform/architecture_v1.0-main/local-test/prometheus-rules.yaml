groups:
  - name: app_derived_metrics
    interval: 30s
    rules:
      - record: app_http_server_errors_5m
        expr: |
          round(
            sum by (job, http_route) (
              increase(
                http_server_request_duration_seconds_count{
                  http_response_status_code=~"5..",
                  http_route!="/error"
                }[5m]
              )
            )
          )

      - record: app_http_server_requests_5m
        expr: |
          round(
            sum by (job, http_route) (
              increase(
                http_server_request_duration_seconds_count{
                  http_route!="/error"
                }[5m]
              )
            )
          )

      - record: app_http_server_error_ratio_5m
        expr: |
          app_http_server_errors_5m
          /
          clamp_min(app_http_server_requests_5m, 1)

      - record: app_http_server_latency_p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, http_route, le) (
              rate(
                http_server_request_duration_seconds_bucket{
                  http_route!="/error"
                }[5m]
              )
            )
          )

  - name: infra_derived_metrics
    interval: 30s
    rules:
      - record: app_container_cpu_utilization_avg_5m
        expr: |
          avg by (container_name) (
            avg_over_time(
              container_cpu_utilization_ratio{
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: app_container_memory_utilization_avg_5m
        expr: |
          avg by (container_name) (
            avg_over_time(
              container_memory_percent_ratio{
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: app_container_cpu_utilization_max_5m
        expr: |
          max by (container_name) (
            max_over_time(
              container_cpu_utilization_ratio{
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: app_container_memory_utilization_max_5m
        expr: |
          max by (container_name) (
            max_over_time(
              container_memory_percent_ratio{
                container_name=~".*(springboot|thymeleaf|flask).*"
              }[5m]
            )
          )

      - record: app_host_memory_usage_avg_5m
        expr: |
          avg by (job, host_name) (
            avg_over_time(system_memory_usage_bytes[5m])
          )

      - record: app_host_network_rx_bytes_5m
        expr: |
          round(
            sum by (job, host_name) (
              increase(system_network_io_bytes_total{direction="receive"}[5m])
            )
          )

      - record: app_host_network_tx_bytes_5m
        expr: |
          round(
            sum by (job, host_name) (
              increase(system_network_io_bytes_total{direction="transmit"}[5m])
            )
          )

  - name: jvm_derived_metrics
    interval: 30s
    rules:
      - record: app_jvm_cpu_utilization_avg_5m
        expr: |
          avg by (job) (
            avg_over_time(jvm_cpu_recent_utilization_ratio[5m])
          )

      - record: app_jvm_cpu_utilization_pct_avg_5m
        expr: |
          100 * app_jvm_cpu_utilization_avg_5m

      - record: app_jvm_memory_used_avg_5m
        expr: |
          avg by (job) (
            avg_over_time(jvm_memory_used_bytes[5m])
          )

      - record: app_jvm_memory_used_max_5m
        expr: |
          max by (job) (
            max_over_time(jvm_memory_used_bytes[5m])
          )

      - record: app_jvm_gc_count_5m
        expr: |
          round(
            sum by (job) (
              increase(jvm_gc_duration_seconds_count[5m])
            )
          )

      - record: app_jvm_gc_duration_p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le) (
              rate(jvm_gc_duration_seconds_bucket[5m])
            )
          )
